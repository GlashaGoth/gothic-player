    <meta charset="UTF-8">

    <title>Elli Gothic Player — 44 трека</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1025 100%);
            font-family: 'Segoe UI', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .gothic-player {
            max-width: 950px;
            width: 100%;
            background: rgba(10, 8, 15, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(128, 90, 160, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(128, 0, 255, 0.2);
            overflow: hidden;
            padding: 24px;
        }

        .player-header {
            text-align: center;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(160, 120, 200, 0.4);
            padding-bottom: 16px;
        }

        .player-header h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: #c9a8f0;
            text-shadow: 0 0 8px #8a2be2;
        }

        .player-header p {
            color: #b29ad0;
            font-size: 0.8rem;
            margin-top: 6px;
        }

        .current-track {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 20px;
            text-align: center;
            border-left: 4px solid #b77eeb;
        }

        .track-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #e5d0ff;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .track-artist {
            color: #9d84b8;
            font-size: 0.8rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin-bottom: 20px;
        }

        .ctrl-btn {
            background: rgba(30, 20, 45, 0.8);
            border: 1px solid #8060a0;
            color: #d4b8ff;
            font-size: 1.8rem;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            background: #5a3a7a;
            color: white;
            transform: scale(1.05);
            border-color: #c99aff;
        }

        .play-btn {
            background: #6a3a9a;
            color: white;
            width: 70px;
            height: 70px;
            font-size: 2.2rem;
        }

        .progress-area {
            margin-bottom: 20px;
        }

        .progress-bar-bg {
            background: #2a1e35;
            height: 6px;
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #b77eeb, #e5b3ff);
            width: 0%;
            height: 100%;
            transition: width 0.05s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.75rem;
            color: #aa99cc;
        }

        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 40px;
        }

        .volume-slider {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #392e47;
            border-radius: 5px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #dbbaff;
            border-radius: 50%;
            cursor: pointer;
        }

        .playlist {
            max-height: 380px;
            overflow-y: auto;
            border-radius: 18px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 4px;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            margin: 5px 6px;
            background: rgba(20, 15, 30, 0.7);
            border-radius: 30px;
            cursor: pointer;
            transition: 0.1s;
            border-left: 3px solid transparent;
            color: #cfc1e6;
            font-size: 0.85rem;
        }

        .playlist-item:hover {
            background: #2f2442;
            border-left-color: #b77eeb;
        }

        .плейлист-элемент.активный {
            фон: #3e2b58;
            цвет левой границы: #е2b4ff;
            цвет: белый;
        }

        .название песни {
            белое пространство: новрап;
            переполнение: скрытый;
            переполнение текста: многоточие;
            максимальная ширина: 75%;
        }

        .продолжительность песни {
            размер шрифта: 0,7бэр;
            фон: #00000055;
            прокладка: 3пх 8пх;
            радиус границы: 20пх;
        }

        .плейлист::-вебкит-полоса прокрутки {
            ширина: 5пх;
        }
        .плейлист::-webkit-scrollbar-track {
            фон: #1e1728;
        }
        .плейлист::-webkit-scrollbar-thumb {
            фон: #8a6cb0;
            радиус границы: 10пх;
        }

        нижний колонтитул {
            выравнивание текста: центр;
            край-верх: 18пх;
            размер шрифта: 0,7бэр;
            цвет: #6а5385;
        }
 </стиль>

    константа текущийTrackArtistSpan = документ.getElementById('currentTrackArtist');
    константа плейлистDiv = документ.getElementById('контейнер плейлиста');

    функция форматВремя(сек) {
        если (isNaN(сек) || сек === Бесконечность) возвращаться "0:00";
        константа мин = Математика.этаж(сек / 60);
        константа секунды = Математика.этаж(сек % 60);
        возвращаться `${мин}:${секунды < 10 ? '0' : ''}${секунды}`;
    }

    функция loadTrack(индекс) {
        если (индекс < 0) индекс = 0;
        if (index >= tracks.length) index = 0;
        currentIndex = index;
        const track = tracks[currentIndex];
        audio.src = track.src;
        currentTrackNameSpan.textContent = track.name;
        currentTrackArtistSpan.textContent = track.artist;
        
        document.querySelectorAll('.playlist-item').forEach((item, i) => {
            if (i === currentIndex) item.classList.add('active');
            else item.classList.remove('active');
        });
        
        if (isPlaying) audio.play().catch(e => console.log(e));
    }

    function updateProgress() {
        if (audio.duration && !isNaN(audio.duration)) {
            progressFill.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
            currentTimeSpan.textContent = formatTime(audio.currentTime);
            totalDurationSpan.textContent = formatTime(audio.duration);
        }
    }

    function togglePlay() {
        if (!audio.src) loadTrack(0);
        if (isPlaying) {
            audio.pause();
            playBtn.textContent = "▶";
            isPlaying = false;
        } else {
            audio.play().catch(e => console.log(e));
            playBtn.textContent = "⏸";
            isPlaying = true;
        }
    }

    function nextTrack() { loadTrack((currentIndex + 1) % tracks.length); if (isPlaying) audio.play(); }
    function prevTrack() { loadTrack((currentIndex - 1 + tracks.length) % tracks.length); if (isPlaying) audio.play(); }
    function setProgress(e) {
        const rect = progressBg.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        if (audio.duration) audio.currentTime = percent * audio.duration;
    }

    function buildPlaylist() {
        playlistDiv.innerHTML = "";
        tracks.forEach((track, idx) => {
            const div = document.createElement('div');
            div.classList.add('playlist-item');
            if (idx === currentIndex) div.classList.add('active');
            div.innerHTML = `<span class="song-title">${track.name} · ${track.artist}</span><span class="song-duration"></span>`;
            div.addEventListener('click', () => { currentIndex = idx; loadTrack(currentIndex); if (!isPlaying) togglePlay(); else audio.play(); });
            playlistDiv.appendChild(div);
        });
    }

    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('ended', nextTrack);
    playBtn.addEventListener('click', togglePlay);
    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);
    progressBg.addEventListener('click', setProgress);
    volumeSlider.addEventListener('input', (e) => audio.volume = parseFloat(e.target.value));

    buildPlaylist();
    loadTrack(0);
    audio.volume = volumeSlider.value;
    playBtn.textContent = "▶";
    isPlaying = false;
</script>
